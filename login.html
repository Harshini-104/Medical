<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- Header -->
    <header class="navbar">
        <div class="nav-container">

            <div class="logo">
                <a href=""><img src="./image/logo-removebg-preview.webp" alt="MediCare Logo"></a>
            </div>

            <nav class="nav-menu">
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./about.html">About</a></li>
                    <li><a href="./service.html">Services</a></li>
                    <li><a href="./blog.html">Blog</a></li>
                    <li><a href="./dashboard.html">Dashboard</a></li>
                    <li><a href="./contact.html">Contact</a></li>
                </ul>
            </nav>

            <div class="nav-btn">
                <a href="./login.html" class="login-btn">Login</a>
            </div>

            <div class="menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </div>

        </div>
    </header>

    <div class="auth-wrapper">

        <div class="auth-image">
            <div class="overlay">
                <h1>Stackly Health Hub</h1>
                <p>Your trusted healthcare partner</p>
            </div>
        </div>

        <div class="auth-content">

            <div class="toggle-buttons">
                <button id="loginBtn" class="active">Sign In</button>
                <button id="signupBtn">Sign Up</button>
                <div class="slider"></div>
            </div>

            <form id="loginForm" class="form active-form">
                <h2>Welcome Back</h2>

                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>

                <button type="submit" class="main-btn">Login</button>
            </form>

            <form id="signupForm" class="form">
                <h2>Create Account</h2>

                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <input type="password" id="confirmPassword" placeholder="Re-enter Password" required>

                <span id="errorMsg"></span>

                <button type="submit" class="main-btn">Sign Up</button>
            </form>

        </div>

    </div>

    <script>
        const loginBtn = document.getElementById("loginBtn");
        const signupBtn = document.getElementById("signupBtn");
        const slider = document.querySelector(".slider");

        const loginForm = document.getElementById("loginForm");
        const signupForm = document.getElementById("signupForm");

        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");
        const errorMsg = document.getElementById("errorMsg");

        signupBtn.addEventListener("click", () => {
            slider.style.transform = "translateX(100%)";
            signupBtn.classList.add("active");
            loginBtn.classList.remove("active");

            loginForm.classList.remove("active-form");
            signupForm.classList.add("active-form");
        });

        loginBtn.addEventListener("click", () => {
            slider.style.transform = "translateX(0)";
            loginBtn.classList.add("active");
            signupBtn.classList.remove("active");

            signupForm.classList.remove("active-form");
            loginForm.classList.add("active-form");
        });

        signupForm.addEventListener("submit", function (e) {
            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                errorMsg.textContent = "Passwords do not match!";
            } else {
                errorMsg.textContent = "";
                alert("Signup Successful!");
            }
        });

    </script>
    <script>
        const toggle = document.querySelector(".menu-toggle");
        const navMenu = document.querySelector(".nav-menu");

        toggle.addEventListener("click", () => {
            navMenu.classList.toggle("active");
        });
    </script>
</body>

</html>

    }

    }

    }

    }

            border-radius: 10px;
            padding: 50px;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .nav-menu ul {
            flex-direction: column;

        }

        .nav-menu ul li a {
            font-size: 16px;
            color: rgb(255, 255, 255);
        }

        .nav-menu.active {
            display: flex;
        }

        .nav-btn {
            display: block;

        }

            padding: 6px 15px;

        }

        }
    }

    body {

        align-items: center;
        background: #f0f7f6;
    }

    .auth-wrapper {
        width: 900px;
        height: 550px;

    .auth-image {
        width: 50%;
        background: url('./image/services.png') center/cover no-repeat;
        position: relative;
    }

    .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 90, 80, 0.75);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .overlay h1 {
        font-size: 38px;
    }

    .overlay p {
        margin-top: 10px;
    }

    .auth-content {
        width: 50%;
        padding: 50px;
        position: relative;

    .toggle-buttons {
        display: flex;

    .toggle-buttons button {
        flex: 1;
        padding: 12px;
        border: none;
        background: none;

    .slider {

    .form {

        border-radius: 8px;

    .main-btn {
        padding: 12px;
        border: none;
        border-radius: 8px;

    }

    .main-btn:hover {
        background: #0ea5a4;
    }

    .active-form {
        display: flex;
    }

    #errorMsg {
        color: red;
        font-size: 13px;
        margin-bottom: 10px;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;

        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media(max-width: 900px) {
        .auth-wrapper {
            flex-direction: column;
            height: auto;
        }

        .auth-image,
        .auth-content {
            width: 100%;
        }

        .auth-image {
            height: 250px;
        }
    }
</style>
